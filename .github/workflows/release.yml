# trx releases via the shared byteowlz reusable workflow (ADR-0021).
# It builds linux-gnu (glibc floor) in the byt container + macOS natively, then
# publishes the GitHub release, Homebrew formula, and AUR package. All release
# config lives in byt.release.toml; credentials come from org secrets.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.6.3)
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
      packages: read
    uses: byteowlz/byt/.github/workflows/release.yml@main
    secrets: inherit
    with:
      tag: ${{ inputs.tag }}
